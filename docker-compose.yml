# Docker Compose configuration for running all four microservices together.
# Each service is built from its own Dockerfile and runs on a separate port.
# Environment variables are loaded from each service's .env file.

services:

  # Handles GET /api/logs - returns all request logs from MongoDB
  admin-logs-service:
    build: ./admin-logs-service
    ports:
      - "3001:3001"
    env_file:
      - ./admin-logs-service/.env

  # Handles user-related endpoints: POST /api/add, GET /api/users, GET /api/users/:id
  users-service:
    build: ./users-service
    ports:
      - "3002:3002"
    env_file:
      - ./users-service/.env

  # Handles cost-related endpoints: POST /api/add, GET /api/report
  costs-service:
    build: ./costs-service
    ports:
      - "3003:3003"
    env_file:
      - ./costs-service/.env

  # Handles GET /api/about - returns team member details
  about-service:
    build: ./about-service
    ports:
      - "3004:3004"
    env_file:
      - ./about-service/.env
